<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StockMonk</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <svg class="logo-svg" viewBox="0 0 24 24" fill="none">
        <path d="M3 17 L7 11 L11 14 L16 7 L21 10" stroke="#10b981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="21" cy="10" r="2" fill="#10b981"/>
      </svg>
      <span class="logo-text">StockMonk</span>
    </div>
    <div class="header-right">
      <span id="last-updated" class="last-updated"></span>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="dashboard">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
      Dashboard
    </button>
    <button class="tab-btn" data-tab="search">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      Search
    </button>
    <button class="tab-btn" data-tab="watchlist">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
      Watchlist
      <span id="watchlist-badge" class="nav-badge hidden"></span>
    </button>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- ═══ DASHBOARD TAB ═══ -->
    <div id="tab-dashboard" class="tab-pane active">
      <div class="section-header">
        <h3 class="section-title">
          <span class="section-icon">🔥</span> Top Buy Signals
        </h3>
        <button id="refresh-btn" class="refresh-btn" title="Refresh">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
        </button>
      </div>
      <div id="signals-container"></div>

      <div class="section-header" style="margin-top:12px">
        <h3 class="section-title">
          <span class="section-icon">📈</span> Trending on Reddit
        </h3>
      </div>
      <div id="trending-container"></div>
    </div>

    <!-- ═══ SEARCH TAB ═══ -->
    <div id="tab-search" class="tab-pane hidden">
      <div class="search-wrap">
        <div class="search-row">
          <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
            <input id="search-input" type="text" placeholder="Enter ticker… NVDA, AAPL, TSLA" autocomplete="off" spellcheck="false" maxlength="10">
          </div>
          <button id="search-btn" class="search-submit-btn">Go</button>
        </div>
        <div id="search-history-row" class="history-row"></div>
      </div>
      <div id="search-result-container"></div>
    </div>

    <!-- ═══ WATCHLIST TAB ═══ -->
    <div id="tab-watchlist" class="tab-pane hidden">
      <div class="add-row">
        <input id="wl-input" type="text" placeholder="Add ticker… e.g. MSFT" autocomplete="off" spellcheck="false" maxlength="10">
        <button id="wl-add-btn" class="add-btn">+ Add</button>
      </div>
      <div id="watchlist-container"></div>
    </div>

  </main>

  <!-- ═══ SETTINGS MODAL ═══ -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button id="settings-close" class="icon-btn">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label class="setting-label">API Base URL</label>
          <input id="setting-api-url" type="text" class="setting-input" placeholder="http://your-vps:3003/api/v1">
          <p class="setting-hint">The base URL of your StockMonk API server</p>
        </div>
        <div class="setting-group">
          <label class="setting-label">API Key</label>
          <input id="setting-api-key" type="password" class="setting-input" placeholder="sm_xxxxxxxxxxxxx">
          <p class="setting-hint">Required for all /api/v1/* endpoints (x-api-key header)</p>
        </div>
        <div class="setting-group">
          <label class="setting-label">Auto-Refresh Dashboard</label>
          <div class="toggle-row">
            <label class="toggle">
              <input id="setting-auto-refresh" type="checkbox">
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Refresh every 5 minutes</span>
          </div>
        </div>
        <div class="setting-group">
          <label class="setting-label">Min Signal Score (Dashboard)</label>
          <div class="slider-row">
            <input id="setting-min-score" type="range" min="0" max="80" step="5" value="0" class="score-slider">
            <span id="setting-min-score-val" class="slider-val">0</span>
          </div>
        </div>
        <div class="modal-actions">
          <button id="settings-save" class="primary-btn">Save Settings</button>
          <button id="settings-clear" class="danger-btn">Clear All Data</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

</div>
<script src="popup.js"></script>
</body>
</html>
